name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 (required by Android Gradle) ───────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Node (for Capacitor CLI) ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── Android SDK ─────────────────────────────────────────────────────────
      - uses: android-actions/setup-android@v3

      # ── Install JS deps ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Capacitor config → android assets ───────────────────────────────────
      # We use server.url (Vercel) so no Next.js build is needed.
      # `cap sync` copies capacitor.config.json into the android project.
      - name: Capacitor sync (remote URL mode)
        run: |
          npx cap sync android --no-build

      # ── Gradle build ────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Debug APK — works without a keystore, installable on any device
      # with "Install unknown apps" enabled (or via adb).
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload APK as artifact ──────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 4scans-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── (Optional) Release APK — uncomment and add secrets to enable ────────
